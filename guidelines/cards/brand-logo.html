<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:0; background:var(--gradient-app); display:flex; align-items:stretch; height:180px; }
  .col { display:flex; align-items:center; justify-content:center; flex:1; gap:0; }
  .onbrand { background:var(--brand-blue); }
  .mark { height:120px; width:auto; display:block; }
</style></head>
<body>
  <div class="col"><span class="akm-logo" style="font-size:40px;"><img src="../../assets/logo-mark.png" alt="" /><span>АКМЕТРОН</span></span></div>
  <div class="col" style="border-left:1px solid var(--hairline); border-right:1px solid var(--hairline);"><img class="mark" src="../../assets/logo-mark.png" alt="Акметрон mark" /></div>
  <div class="col onbrand"><span style="font-family:var(--font-display);font-weight:800;font-size:30px;letter-spacing:0.04em;color:#fff;">АКМЕТРОН</span></div>
</body></html>
