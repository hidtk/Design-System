<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--gradient-panel); display:flex; gap:36px; align-items:flex-end; }
  .item span { display:block; }
  .lab { font-family:var(--font-body); font-size:11px; color:var(--text-3); margin-top:6px; }
  .t { font-family:var(--font-display); font-weight:800; font-size:30px; }
</style></head>
<body>
  <div class="item"><span class="t" style="color:var(--text-1)">Текст</span><span class="lab">Primary · #16233F</span></div>
  <div class="item"><span class="t" style="color:var(--text-2)">Текст</span><span class="lab">Secondary · #4A5874</span></div>
  <div class="item"><span class="t" style="color:var(--text-3)">Текст</span><span class="lab">Tertiary · #8693AD</span></div>
  <div class="item" style="background:var(--brand-blue);padding:8px 12px;border-radius:8px"><span class="t" style="color:var(--white)">Текст</span><span class="lab" style="color:rgba(255,255,255,0.7)">Spotlight · #FFFFFF</span></div>
</body></html>
