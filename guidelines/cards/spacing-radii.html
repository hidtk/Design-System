<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="8 / 12 / 18 px surfaces · full pill for chips" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-main); display:flex; align-items:center; gap:20px; }
  .box { width:84px; height:84px; background:var(--gradient-panel); border:1px solid var(--hairline); display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; }
  .n { font-family:var(--font-display); font-weight:700; font-size:11px; color:var(--text-2); }
  .pill { height:40px; padding:0 22px; display:flex; align-items:center; background:var(--fill-faint); border:1px solid var(--hairline); border-radius:var(--radius-pill); font-family:var(--font-body); font-size:13px; color:var(--text-2); }
</style></head>
<body>
  <div class="box" style="border-radius:8px"><span class="n">8 · sm</span></div>
  <div class="box" style="border-radius:12px"><span class="n">12 · md</span></div>
  <div class="box" style="border-radius:18px"><span class="n">18 · lg</span></div>
  <div class="pill">999 · pill</div>
</body></html>
