<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Soft cool-grey field, light background, white panel" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-main); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; height:96px; border-radius:var(--radius-md); border:1px solid var(--hairline); display:flex; flex-direction:column; justify-content:flex-end; padding:12px; }
  .n { font-family:var(--font-display); font-weight:700; font-size:12px; color:var(--text-1); }
  .h { font-family:var(--font-body); font-size:11px; color:var(--text-2); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--field-deep)"><span class="n">Deep field</span><span class="h">#E7EEF7</span></div>
    <div class="sw" style="background:var(--gradient-app)"><span class="n">Background</span><span class="h">#F5F8FC → #EAF1FA</span></div>
    <div class="sw" style="background:var(--gradient-panel)"><span class="n">Panel</span><span class="h">#FFFFFF → #F6FAFD</span></div>
  </div>
</body></html>
