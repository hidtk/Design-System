<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-main); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; height:96px; border-radius:var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding:12px; }
  .n { font-family:var(--font-display); font-weight:700; font-size:12px; color:#FFFFFF; }
  .h { font-family:var(--font-body); font-size:11px; color:rgba(255,255,255,0.78); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--brand-blue)"><span class="n">Brand</span><span class="h">#004180 · логотип</span></div>
    <div class="sw" style="background:var(--blue)"><span class="n">Primary</span><span class="h">#1C6BB0</span></div>
    <div class="sw" style="background:var(--blue-light)"><span class="n">Light</span><span class="h">#3E8FD0</span></div>
    <div class="sw" style="background:var(--blue-deep)"><span class="n">Deep</span><span class="h">#134E86</span></div>
  </div>
</body></html>
