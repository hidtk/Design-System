<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4 · 8 · 16 · 24 · 32 · 48 · 64 — no arbitrary values" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-main); display:flex; align-items:flex-end; gap:18px; }
  .item { text-align:center; }
  .bar { background:var(--blue); border-radius:4px; width:100%; }
  .n { font-family:var(--font-display); font-weight:700; font-size:12px; color:var(--text-2); margin-top:8px; }
</style></head>
<body>
  <div class="item"><div class="bar" style="height:4px;width:4px"></div><div class="n">4</div></div>
  <div class="item"><div class="bar" style="height:8px;width:8px"></div><div class="n">8</div></div>
  <div class="item"><div class="bar" style="height:16px;width:16px"></div><div class="n">16</div></div>
  <div class="item"><div class="bar" style="height:24px;width:24px"></div><div class="n">24</div></div>
  <div class="item"><div class="bar" style="height:32px;width:32px"></div><div class="n">32</div></div>
  <div class="item"><div class="bar" style="height:48px;width:48px"></div><div class="n">48</div></div>
  <div class="item"><div class="bar" style="height:64px;width:64px"></div><div class="n">64</div></div>
</body></html>
