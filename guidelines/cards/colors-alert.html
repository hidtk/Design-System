<!-- @dsCard group="Colors" viewport="700x150" name="Alert / pain palette" subtitle="Rose — risks, problems, negatives ONLY" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--bg-main); }
  .card { background:var(--gradient-alert); border:1px solid rgba(201,122,142,0.28); border-left:3px solid var(--alert-stripe); border-radius:var(--radius-md); padding:18px 20px; }
  .h { font-family:var(--font-display); font-weight:700; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:var(--alert-text); }
  .p { font-family:var(--font-body); font-size:14px; color:var(--alert-text); margin-top:6px; opacity:0.85; }
  .chips { display:flex; gap:10px; margin-top:14px; }
  .chip { font-family:var(--font-body); font-size:11px; padding:4px 10px; border-radius:var(--radius-pill); background:rgba(201,122,142,0.14); color:var(--alert-text); }
</style></head>
<body>
  <div class="card">
    <span class="h">Риск</span>
    <p class="p">Зависимость от импортных поставок — сроки до 6 месяцев</p>
    <div class="chips"><span class="chip">stripe #C97A8E</span><span class="chip">text #F0D4DC</span><span class="chip">#22203A → #171F37</span></div>
  </div>
</body></html>
