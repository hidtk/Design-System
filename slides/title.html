<!-- @dsCard group="Slides" viewport="1280x720" name="Title slide" subtitle="Eyebrow → title → subtitle, puzzle + glow" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body { margin:0; height:100%; }
  .slide { position:relative; width:1280px; height:720px; background:var(--gradient-app); overflow:hidden; display:flex; flex-direction:column; justify-content:center; padding:0 96px; box-sizing:border-box; }
  .tex { position:absolute; top:0; right:0; width:48%; height:100%; object-fit:cover; object-position:top right; opacity:0.42;
    -webkit-mask-image:linear-gradient(to left, #000 4%, transparent 90%); mask-image:linear-gradient(to left, #000 4%, transparent 90%); }
  .glow { position:absolute; width:560px; height:560px; border-radius:50%; bottom:-260px; left:-160px; background:radial-gradient(circle, var(--blue-glow) 0%, transparent 70%); filter:blur(20px); }
  .eyebrow { position:relative; }
  h1 { position:relative; font-family:var(--font-display); font-weight:900; font-size:88px; line-height:1.0; letter-spacing:-0.03em; color:var(--text-1); margin:24px 0 0; max-width:880px; }
  .sub { position:relative; font-family:var(--font-body); font-size:24px; line-height:1.5; color:var(--text-2); margin-top:28px; max-width:620px; }
  .foot { position:absolute; left:96px; bottom:48px; display:flex; align-items:center; gap:16px; }
</style></head>
<body>
  <div class="slide">
    <img class="tex" src="../assets/puzzle-pattern.svg" alt="" />
    <div class="glow"></div>
    <span class="akm-eyebrow eyebrow">Контрольно-измерительное оборудование</span>
    <h1>Измеряем точно. Разрабатываем под задачу</h1>
    <p class="sub">Оборудование, разработка электроники и СВЧ-устройства — без посредников</p>
    <div class="foot"><span class="akm-logo" style="font-size:32px;"><img src="../assets/logo-mark.png" alt="" /><span>АКМЕТРОН</span></span></div>
  </div>
</body></html>
