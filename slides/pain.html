<!-- @dsCard group="Slides" viewport="1280x720" name="Pain / risk slide" subtitle="Rose alert palette — problems only" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body { margin:0; height:100%; }
  .slide { position:relative; width:1280px; height:720px; background:var(--gradient-app); overflow:hidden; padding:88px 96px; box-sizing:border-box; }
  h2 { font-family:var(--font-display); font-weight:800; font-size:52px; letter-spacing:-0.02em; color:var(--text-1); margin:16px 0 0; max-width:820px; }
  .rows { display:flex; flex-direction:column; gap:20px; margin-top:56px; }
  .card { background:var(--gradient-alert); border:1px solid rgba(201,122,142,0.28); border-left:4px solid var(--alert-stripe); border-radius:var(--radius-md); padding:28px 32px; }
  .h { font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:0.1em; text-transform:uppercase; color:var(--alert-text); }
  .p { font-family:var(--font-body); font-size:20px; line-height:1.5; color:var(--alert-text); opacity:0.9; margin-top:8px; }
</style></head>
<body>
  <div class="slide">
    <span class="akm-eyebrow" style="color:var(--alert-stripe)">Проблема</span>
    <h2>Где традиционный путь подводит</h2>
    <div class="rows">
      <div class="card"><div class="h">Сроки</div><p class="p">Поставка импортных приборов — до 6 месяцев ожидания</p></div>
      <div class="card"><div class="h">Сервис</div><p class="p">Ремонт и поверка через посредника — простой оборудования</p></div>
      <div class="card"><div class="h">Гибкость</div><p class="p">Нестандартную конфигурацию заказать негде</p></div>
    </div>
  </div>
</body></html>
